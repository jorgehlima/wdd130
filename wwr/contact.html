<!-- 11 June 2026 -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | Rafting Travel Company</title>

    <meta name="description"
      content="Contact Rafting Travel Company — reach out for trip reservations, general inquiries, or customer support for our rafting adventures.">

    <meta name="author" content="Jorge Henrique de Souza Lima">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body class="page-contact">

    <header>

        <!-- Logo img -->
        <img src="images/logo.jpg" alt="Rafting Travel Company Logo">

        <!-- Navigation links -->
        <nav>
            <a href="index.html"><strong>Home</strong></a>
            <a href="about.html"><strong>About Us</strong></a>
            <a href="trips.html"><strong>Trips</strong></a>
            <a href="contact.html"><strong>Contact Us</strong></a>
        </nav>
    </header>

    <main>
        <!-- Hero div: must contain article with img -->
        <div class="hero">
            <img src="images/contact-hero.png"
              alt="Cartoon smoke signal representing communication">
            <h1>Rafting Travel Company</h1>

            <!-- Company Info -->
            <section class="company-info">
                <address>
                    <strong>2504 Confederate Dr.</strong><br>
                    Wilmington, NC 28403<br>
                    <a href="tel:+19999999999">(999) 999-9999</a><br>
                    <a href="mailto:info@raftingtravelco.com">info@raftingtravelco.com</a>
                </address>
            </section>

        </div><!-- hero closed -->

        <div class="contact-grid-wrapper">

            <div class="contact-grid">

                <!-- Map -->
                <div class="map-wrap" aria-label="Map showing our location">
                    <iframe title="Rafting Travel Co. Location"
                      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4385.444048011335!2d-77.9195634879127!3d34.22946930823793!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89a9f57aa96d9b89%3A0x5f8cbdc86ac19b1c!2s2504%20Confederate%20Dr%2C%20Wilmington%2C%20NC%2028403!5e1!3m2!1sen!2sus!4v1781202301452!5m2!1sen!2sus"
                      width="600" height="450" allowfullscreen="" loading="lazy"
                      referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>

                <!-- Form -->
                <div class="contact-form" aria-labelledby="contact-heading">
                    <form action="#" method="post">

                        <div class="form-row">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" placeholder="Placeholder"
                              required autocomplete="name">
                        </div>

                        <div class="form-row">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Placeholder"
                              required autocomplete="email">
                        </div>

                        <!-- Form, radio, newsletter and button section -->
                        <div class="form-row">
                            <span class="form-label">Message Purpose</span>

                            <div class="radio-group">

                                <input type="radio" id="general" name="purpose" value="general"
                                  checked>
                                <label for="general">General Inquiry</label>

                                <input type="radio" id="reservation" name="purpose"
                                  value="reservation">
                                <label for="reservation">Reservation Question</label>

                                <input type="radio" id="suggestion" name="purpose"
                                  value="suggestion">
                                <label for="suggestion">Website Suggestion</label>

                            </div>
                        </div>

                        <div class="form-row">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" placeholder="Type here"
                              required></textarea>
                        </div>

                        <label class="newsletter-row">
                            <input type="checkbox" id="newsletter" name="newsletter" value="yes"
                              checked>
                            Please subscribe me to the monthly newsletter.
                        </label>

                        <button type="submit" class="btn-submit">Get in Touch!</button>

                    </form>
                </div>

            </div><!-- contact-grid closed -->

        </div><!-- Contact grid wrapper closed -->

        <!-- Team section w/ title and five pics -->
        <section class="team-section">
            <h2>Adventure Awaits You!</h2>

            <div class="team-figures">

                <figure>
                    <img src="images/employee1.jpg" alt="Alex Rivera — Lead River Guide">
                    <figcaption>Alex Rivera — Lead River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Jordan Shepherd — Safety Coordinator">
                    <figcaption>Jordan Shepherd — Safety Coordinator</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Samantha Keeper — Reservation Specialist">
                    <figcaption>Samantha Keeper — Reservation Specialist</figcaption>
                </figure>

                <figure>
                    <img src="images/employee4.jpg" alt="David Steel - Rafting Operations Manager">
                    <figcaption>David Stelling - Rafting Operations Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/employee5.jpg" alt="Dannielle Bonnes -  Head Paddling Guide">
                    <figcaption>Dannielle Bonnes - Head Paddling Guide</figcaption>
                </figure>

            </div>

        </section>

    </main>

    <footer>

        <p class="copyright">
            &copy; 2026 Rafting Travel Co. | Jorge Lima
        </p>

        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank" rel="noopener noreferrer">
                <img src="images/facebook-square.svg" alt="Facebook">
            </a>
            <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer">
                <img src="images/linkedin-square.svg" alt="LinkedIn">
            </a>
            <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">
                <img src="images/instagram-square.svg" alt="Instagram">
            </a>
        </nav>

    </footer>

</body>

</html>
